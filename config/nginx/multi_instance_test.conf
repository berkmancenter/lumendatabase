events {}

http {
  upstream notices_pool {
    server notices-1:3000;
    server notices-2:3000;
  }

  upstream admin_pool {
    server admin-1:3000;
    server admin-2:3000;
  }

  upstream search_pool {
    server search-1:3000;
    server search-2:3000;
  }

  map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
  }

  server {
    listen 8080;

    proxy_http_version 1.1;
    proxy_set_header Host $http_host;
    proxy_set_header X-Forwarded-Host $http_host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    location = /admin {
      add_header X-Lumen-Upstream-Pool admin always;
      add_header X-Lumen-Upstream-Addr $upstream_addr always;
      proxy_pass http://admin_pool;
    }

    location ^~ /admin/ {
      add_header X-Lumen-Upstream-Pool admin always;
      add_header X-Lumen-Upstream-Addr $upstream_addr always;
      proxy_pass http://admin_pool;
    }

    location ^~ /users/sign_in {
      add_header X-Lumen-Upstream-Pool admin always;
      add_header X-Lumen-Upstream-Addr $upstream_addr always;
      proxy_pass http://admin_pool;
    }

    location ^~ /cms_admin {
      add_header X-Lumen-Upstream-Pool admin always;
      add_header X-Lumen-Upstream-Addr $upstream_addr always;
      proxy_pass http://admin_pool;
    }

    location ^~ /sidekiq {
      add_header X-Lumen-Upstream-Pool admin always;
      add_header X-Lumen-Upstream-Addr $upstream_addr always;
      proxy_pass http://admin_pool;
    }

    location ^~ /enterprise/notices/search {
      add_header X-Lumen-Upstream-Pool search always;
      add_header X-Lumen-Upstream-Addr $upstream_addr always;
      proxy_pass http://search_pool;
    }

    location ^~ /notices/search {
      add_header X-Lumen-Upstream-Pool search always;
      add_header X-Lumen-Upstream-Addr $upstream_addr always;
      proxy_pass http://search_pool;
    }

    location ^~ /entities/search {
      add_header X-Lumen-Upstream-Pool search always;
      add_header X-Lumen-Upstream-Addr $upstream_addr always;
      proxy_pass http://search_pool;
    }

    location ^~ /media_mentions/search {
      add_header X-Lumen-Upstream-Pool search always;
      add_header X-Lumen-Upstream-Addr $upstream_addr always;
      proxy_pass http://search_pool;
    }

    location = /faceted_search {
      add_header X-Lumen-Upstream-Pool search always;
      add_header X-Lumen-Upstream-Addr $upstream_addr always;
      proxy_pass http://search_pool;
    }

    location = /twitter/international {
      add_header X-Lumen-Upstream-Pool search always;
      add_header X-Lumen-Upstream-Addr $upstream_addr always;
      proxy_pass http://search_pool;
    }

    location ~* ^/(twitter|google)(/|$) {
      add_header X-Lumen-Upstream-Pool search always;
      add_header X-Lumen-Upstream-Addr $upstream_addr always;
      proxy_pass http://search_pool;
    }

    location ^~ /search {
      add_header X-Lumen-Upstream-Pool search always;
      add_header X-Lumen-Upstream-Addr $upstream_addr always;
      proxy_pass http://search_pool;
    }

    location = /notices {
      add_header X-Lumen-Upstream-Pool notices always;
      add_header X-Lumen-Upstream-Addr $upstream_addr always;
      proxy_pass http://notices_pool;
    }

    location ^~ /notices/ {
      add_header X-Lumen-Upstream-Pool notices always;
      add_header X-Lumen-Upstream-Addr $upstream_addr always;
      proxy_pass http://notices_pool;
    }

    location ^~ /n/ {
      add_header X-Lumen-Upstream-Pool notices always;
      add_header X-Lumen-Upstream-Addr $upstream_addr always;
      proxy_pass http://notices_pool;
    }

    location ^~ /N/ {
      add_header X-Lumen-Upstream-Pool notices always;
      add_header X-Lumen-Upstream-Addr $upstream_addr always;
      proxy_pass http://notices_pool;
    }

    location ^~ /file_uploads/ {
      add_header X-Lumen-Upstream-Pool notices always;
      add_header X-Lumen-Upstream-Addr $upstream_addr always;
      proxy_pass http://notices_pool;
    }

    location / {
      add_header X-Lumen-Upstream-Pool notices always;
      add_header X-Lumen-Upstream-Addr $upstream_addr always;
      proxy_pass http://notices_pool;
    }
  }
}
