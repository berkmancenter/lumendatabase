services:
  postgres:
    image: 'postgres:13.6-alpine'
    volumes:
      - 'postgres:/var/lib/postgresql/data'
      - '.:/app'
    env_file:
      - '.env'
    environment:
      POSTGRES_USER: ${DATABASE_DEVELOPMENT_USERNAME}
      POSTGRES_PASSWORD: ${DATABASE_DEVELOPMENT_PASSWORD}

  website:
    depends_on:
      - 'postgres'
    build: .
    ports:
      - '8282:3000'
      - '1080:1080'
    volumes:
      - '.:/app'
      - docker_website_bash_history:/home/lumen/hist
    env_file:
      - '.env'
    environment:
      HISTFILE: /home/lumen/hist/.bash_history

  elasticsearch:
    image: elasticsearch:7.17.0
    environment:
      - http.host=0.0.0.0
      - transport.host=0.0.0.0
      - "ES_JAVA_OPTS=-Xms2g -Xmx2g"
      - discovery.type=single-node
      - cluster.routing.allocation.disk.threshold_enabled=false
    volumes:
      - esdata:/usr/share/elasticsearch/data
    ports:
      - 9200:9200
      - 9300:9300
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    mem_limit: 4g

  kibana:
    depends_on:
      - 'elasticsearch'
    image: kibana:7.17.0
    ports:
      - 5601:5601

  matomo_db:
    image: mariadb:11.4
    command: --max-allowed-packet=64MB
    volumes:
      - matomo_db:/var/lib/mysql
    environment:
      MYSQL_DATABASE: ${MATOMO_DATABASE_DBNAME:-matomo}
      MYSQL_USER: ${MATOMO_DATABASE_USERNAME:-matomo}
      MYSQL_PASSWORD: ${MATOMO_DATABASE_PASSWORD:-matomo-secret}
      MYSQL_ROOT_PASSWORD: ${MATOMO_DATABASE_ROOT_PASSWORD:-matomo-root-secret}

  matomo:
    image: matomo:5-apache
    depends_on:
      - 'matomo_db'
    ports:
      - '${MATOMO_PORT:-8283}:80'
    volumes:
      - matomo:/var/www/html
    environment:
      MATOMO_DATABASE_HOST: matomo_db
      MATOMO_DATABASE_ADAPTER: 'PDO\MYSQL'
      MATOMO_DATABASE_TABLES_PREFIX: matomo_
      MATOMO_DATABASE_USERNAME: ${MATOMO_DATABASE_USERNAME:-matomo}
      MATOMO_DATABASE_PASSWORD: ${MATOMO_DATABASE_PASSWORD:-matomo-secret}
      MATOMO_DATABASE_DBNAME: ${MATOMO_DATABASE_DBNAME:-matomo}

  matomo_bootstrap:
    image: matomo:5-apache
    depends_on:
      - 'matomo'
      - 'matomo_db'
    entrypoint:
      - /bin/sh
      - /usr/local/bin/matomo-bootstrap
    volumes:
      - matomo:/var/www/html
      - ./docker/matomo/bootstrap.sh:/usr/local/bin/matomo-bootstrap:ro
    environment:
      MATOMO_URL: http://matomo
      MATOMO_DATABASE_HOST: matomo_db
      MATOMO_DATABASE_ADAPTER: 'PDO\MYSQL'
      MATOMO_DATABASE_TABLES_PREFIX: matomo_
      MATOMO_DATABASE_USERNAME: ${MATOMO_DATABASE_USERNAME:-matomo}
      MATOMO_DATABASE_PASSWORD: ${MATOMO_DATABASE_PASSWORD:-matomo-secret}
      MATOMO_DATABASE_DBNAME: ${MATOMO_DATABASE_DBNAME:-matomo}
      MATOMO_DATABASE_SCHEMA: ${MATOMO_DATABASE_SCHEMA:-Mariadb}
      MATOMO_ADMIN_USERNAME: ${MATOMO_ADMIN_USERNAME:-admin}
      MATOMO_ADMIN_PASSWORD: ${MATOMO_ADMIN_PASSWORD:-matomo-admin}
      MATOMO_ADMIN_EMAIL: ${MATOMO_ADMIN_EMAIL:-admin@example.test}
      MATOMO_SITE_ID: ${MATOMO_SITE_ID:-1}
      MATOMO_SITE_NAME: ${MATOMO_SITE_NAME:-Lumen development}
      MATOMO_SITE_URL: ${MATOMO_SITE_URL:-http://localhost:8282}
      MATOMO_SITE_TIMEZONE: ${MATOMO_SITE_TIMEZONE:-UTC}
      MATOMO_SITE_ECOMMERCE: ${MATOMO_SITE_ECOMMERCE:-0}
      MATOMO_TRUSTED_HOST_INTERNAL: ${MATOMO_TRUSTED_HOST_INTERNAL:-matomo}
      MATOMO_TRUSTED_HOST_EXTERNAL: ${MATOMO_TRUSTED_HOST_EXTERNAL:-localhost:8283}

  logstash:
    env_file:
      - '.env'
    depends_on:
      - 'elasticsearch'
      - 'postgres'
    build:
      context: .
      dockerfile: Dockerfile-logstash
    volumes:
      - '.:/app:ro'
    tmpfs:
      - /usr/share/logstash/data:uid=1000,gid=0,mode=0775
    environment:
      LS_JAVA_OPTS: "-Xmx2g -Xms2g"

  logstash_test:
    env_file:
      - '.env.test'
    depends_on:
      - 'elasticsearch'
      - 'postgres'
    build:
      context: .
      dockerfile: Dockerfile-logstash
    volumes:
      - '.:/app:ro'
    tmpfs:
      - /usr/share/logstash/data:uid=1000,gid=0,mode=0775
    environment:
      LS_JAVA_OPTS: "-Xmx512m -Xms512m"
      LOGSTASH_QUEUE_TYPE: memory

  redis:
    image: 'redis:7.2'
    command: redis-server
    volumes:
      - 'redis:/data'

volumes:
  postgres:
  esdata:
  matomo:
  matomo_db:
  logstash:
  docker_website_bash_history:
  redis:
